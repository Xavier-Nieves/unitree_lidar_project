# Point-LIO Parameters for Unitree LiDAR L1

pointlio_node:
  ros__parameters:
    # LiDAR Configuration
    lidar_type: 1  # 1 for Velodyne, 2 for Ouster, 3 for Livox
    scan_line: 16  # Number of scan lines
    blind: 0.5  # Minimum range (meters)

    # Topics
    lid_topic: "/cloud_registered"
    imu_topic: "/imu/data"

    # IMU Configuration
    imu_en: true
    extrinsic_est_en: false

    # Map Settings
    cube_side_length: 1000.0
    runtime_pos_log_enable: false

    # Feature extraction
    feature_extract_enable: true
    point_filter_num: 1

    # Dense map
    dense_map_enable: true
    max_iteration: 4

    # Publish settings
    publish_voxel_map: false
    publish_max_voxel_layer: 0

    # Save map
    map_file_path: "/home/dronepi/unitree_lidar_project/RPI5/maps/"

    # Performance
    preprocess_threads: 4
    mapping_threads: 4
