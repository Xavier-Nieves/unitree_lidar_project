# Unitree LiDAR L1 Parameters for ROS2

lidar_node:
  ros__parameters:
    # Device configuration
    device_ip: "192.168.1.1"
    device_port: 6543

    # Frame settings
    frame_id: "lidar_link"
    publish_frequency: 10.0  # Hz

    # Point cloud settings
    range_min: 0.1  # meters
    range_max: 30.0  # meters
    angle_min: -180.0  # degrees
    angle_max: 180.0  # degrees

    # IMU settings (if available)
    imu_enabled: true
    imu_topic: "/imu/data"

    # Topics
    point_cloud_topic: "/cloud_registered"
    scan_topic: "/scan"

    # Performance
    queue_size: 10
    use_sim_time: false
