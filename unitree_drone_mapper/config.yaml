# Autonomous Drone Mapping System — Configuration
# Single source of truth for all runtime constants.
# Edit here; restart services to pick up changes.

# ── System ────────────────────────────────────────────────────────────────────
system:
  ros_distro: jazzy
  data_dir: ~/unitree_drone_mapper/data/flights
  log_level: INFO

# ── Hardware ──────────────────────────────────────────────────────────────────
lidar:
  device: /dev/ttyUSB0
  model: unitree_l1
  range_min: 0.1
  range_max: 50.0
  cloud_scan_num: 18
  rotate_yaw_bias: 0.0
  range_scale: 0.001

imu:
  source: lidar_internal        # L1 has built-in IMU

camera:
  model: imx477                 # Arducam IMX477 (HQ camera)
  type: perspective
  video_device: /dev/video0
  capture_interval_s: 10.0
  resolution: [4056, 3040]
  jpeg_quality: 90
  fx: 2435.0
  fy: 2435.0
  cx: 2028.0
  cy: 1520.0

px4:
  connection: /dev/ttyACM0
  baud: 57600                   # matches mavros.service fcu_url baud

# ── Flight ────────────────────────────────────────────────────────────────────
flight:
  takeoff_altitude: 5.0
  cruise_speed: 2.0
  rtl_battery_percent: 25

# ── Collision monitor (collision_monitor.py) ──────────────────────────────────
collision:
  ignore_radius:   0.70         # metres — drone legs + drift margin
  obstacle_radius: 2.00         # metres — must match CP_DIST in QGC
  caution_radius:  3.50         # metres — outer early-warning ring
  down_cone_deg:   30.0         # half-angle of downward AGL extraction cone
  down_fov_deg:    15.0         # beam spread reported to PX4 as field_of_view
  down_max_m:      15.0         # max believable ground distance
  down_min_points: 10           # min in-cone returns before publishing AGL
  publish_hz:      10

# ── SLAM ──────────────────────────────────────────────────────────────────────
slam:
  point_lio_config: config/point_lio_params.yaml
  save_trajectory: true
  save_cloud: true
  use_imu_as_input: false
  prop_at_freq_of_imu: true
  point_filter_num: 1
  filter_size_surf: 0.1
  filter_size_map: 0.1

# ── Mesh pipeline (postprocess_mesh.py) ───────────────────────────────────────
mesh:
  cloud_cap_rate:       1500
  cloud_cap_max:        500000
  cloud_cap_rate_fast:  800
  cloud_cap_max_fast:   150000

# ── HTTP server (rpi_server/serve.py) ─────────────────────────────────────────
server:
  port:      8080
  bind_addr: "0.0.0.0"

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  maps_dir:    "/mnt/ssd/maps"
  rosbags_dir: "/mnt/ssd/rosbags"

# ── Mapping pipeline (legacy/future) ─────────────────────────────────────────
mapping:
  cloud_cleaning:
    outlier_neighbors: 20
    outlier_std_ratio: 2.0
    voxel_size: 0.02
  meshing:
    method: dtm_dsm             # dtm_dsm | poisson
    poisson_depth: 9
  texturing:
    projection: spherical
    blend_overlapping: true
    max_images: 500
  output_formats: [ply]

# ── Calibration ───────────────────────────────────────────────────────────────
calibration:
  lidar_to_camera:
    translation: [0.0, 0.0, 0.05]
    rotation: [0.0, 0.0, 0.0]
