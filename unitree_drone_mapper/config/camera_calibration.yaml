# camera_calibration.yaml — IMX477 (ArduCam) intrinsic and extrinsic parameters
#
# Intrinsic calibration
#   Tool    : OpenCV camera calibration (checkerboard, 9×6, 25mm squares)
#   RMS     : 1.99 px  (acceptable threshold < 2.0 px)
#   Date    : 2025 — re-run if lens or mount changes
#
# Extrinsic calibration (T_cam_body)
#   Origin  : LiDAR (Unitree L2) sensor frame — this is the (0,0,0) reference
#   Measured: physical ruler + sketch validation, confirmed 2026-04-05
#
# Coordinate frame (body / ENU convention)
#   +X  forward  (Pixhawk arrow direction)
#   +Y  left
#   +Z  up
#
# Physical mount layout (top-down view, +X = up in that view)
#
#         +X (Pixhawk fwd)
#          ↑
#    +Y ←  [LiDAR]   ← LiDAR at (0, 0, 0), looks down (–Z)
#           |  0.070 m in –Y
#          [Camera]  ← Camera, also looks down (–Z), yaw 180° vs LiDAR
#
# Translation [x, y, z] in metres, in body frame, origin = LiDAR:
#   x =  0.000   same forward position as LiDAR
#   y = -0.070   70 mm to the RIGHT of LiDAR (–Y = right in body frame)
#   z = +0.030   30 mm ABOVE LiDAR origin
#                (LiDAR hangs below mounting plate; camera sits higher)
#
# Rotation rotation_rpy [roll, pitch, yaw] in radians:
#   roll  = 0.0      no roll
#   pitch = 0.0      no pitch — both sensors face straight down (–Z)
#   yaw   = π        camera rotated 180° about Z relative to LiDAR/body frame
#                    Rz(π): [[-1,0,0],[0,-1,0],[0,0,1]]
#                    Flips camera +X → –X and +Y → –Y.
#                    Downward optical axis (–Z) is preserved — both sensors
#                    still point at the ground.
#
# SINGLE SOURCE OF TRUTH
#   camera_model.py is the ONLY module that reads this file.
#   Do NOT duplicate these values anywhere in config.yaml.

camera:
  image_width:  4056
  image_height: 3040
  fx: 4805.613
  fy: 4773.894
  cx: 2008.339
  cy: 1478.886
  # Distortion coefficients [k1, k2, p1, p2, k3]
  dist_coeffs: [-0.21973, 0.16747, 0.00039, -0.00060, -0.07611]

extrinsic:
  # Camera origin relative to LiDAR origin, expressed in body frame (metres)
  translation: [0.0, -0.070, 0.030]

  # RPY in radians, ZYX convention (scipy Rotation.from_euler('xyz', rpy))
  # 180° yaw only — camera +X faces backward, optical axis still faces down
  rotation_rpy: [0.0, 0.0, 3.14159265]
