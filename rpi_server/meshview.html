<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DronePi Mesh Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0c10;
    color: #e0e6f0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100vh;
  }

  /* ── header bar ── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 48px;
    background: rgba(10,12,16,0.92);
    border-bottom: 1px solid #1e2a3a;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    z-index: 100;
    backdrop-filter: blur(8px);
  }

  #header .logo {
    font-size: 13px;
    font-weight: bold;
    color: #4a9eff;
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  #header .divider {
    width: 1px;
    height: 24px;
    background: #1e2a3a;
  }

  #flight-info {
    font-size: 11px;
    color: #7a8fa8;
    flex: 1;
  }

  #flight-info span {
    color: #c0cfe0;
    margin-right: 16px;
  }

  /* ── header buttons ── */
  .header-btn {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 5px 12px;
    background: transparent;
    border: 1px solid #2a3a50;
    color: #4a6a8a;
    cursor: pointer;
    text-transform: uppercase;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .header-btn:hover { border-color: #4a9eff; color: #4a9eff; }
  .header-btn.active { border-color: #4a9eff; color: #4a9eff; background: rgba(74,158,255,0.08); }

  #status-pill {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 12px;
    background: #1a2030;
    border: 1px solid #2a3a50;
    color: #7a8fa8;
    white-space: nowrap;
  }

  #status-pill.waiting { border-color: #2a3a50; color: #4a6a8a; }
  #status-pill.loading { border-color: #4a7aaa; color: #4a9eff; }
  #status-pill.ready   { border-color: #2a6a3a; color: #4adf7a; }
  #status-pill.error   { border-color: #6a2a2a; color: #df4a4a; }

  /* ── progress bar ── */
  #progress-wrap {
    position: fixed;
    top: 48px; left: 0; right: 0;
    height: 2px;
    background: #0e1218;
    z-index: 99;
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #1a4a8a, #4a9eff);
    transition: width 0.3s ease;
  }

  /* ── canvas ── */
  #canvas-wrap {
    position: fixed;
    top: 50px; left: 0; right: 0; bottom: 0;
    transition: right 0.3s ease;
  }

  canvas { display: block; width: 100%; height: 100%; }

  /* ── waiting overlay ── */
  #overlay {
    position: fixed;
    top: 50px; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: #0a0c10;
    z-index: 50;
    transition: opacity 0.6s ease;
  }

  #overlay.hidden { opacity: 0; pointer-events: none; }

  .pulse-ring {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid #1e3050;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pulse-ring::after {
    content: '';
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 50%;
    border: 2px solid #4a9eff;
    animation: pulse 2s ease-out infinite;
  }

  @keyframes pulse {
    0%   { transform: scale(1);   opacity: 0.8; }
    100% { transform: scale(1.8); opacity: 0;   }
  }

  .drone-icon { font-size: 24px; filter: grayscale(0.3); }

  #overlay-title {
    font-size: 13px;
    letter-spacing: 3px;
    color: #4a6a8a;
    text-transform: uppercase;
  }

  #overlay-sub {
    font-size: 10px;
    color: #2a4a6a;
    letter-spacing: 1px;
  }

  /* ── view cube ── */
  #view-cube-wrap {
    position: fixed;
    top: 86px;
    right: 36px;
    width: 45px;
    height: 55px;
    z-index: 100;
    perspective: 150px;
    transition: right 0.3s ease;
  }

  body.sidebar-open #view-cube-wrap { right: 396px; }

  #view-cube {
    width: 45px;
    height: 45px;
    position: relative;
    transform-style: preserve-3d;
  }

  .vc-face {
    position: absolute;
    width: 45px;
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    font-size: 7px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid rgba(74,158,255,0.25);
    background: rgba(10,18,30,0.72);
    color: #4a7aaa;
    backdrop-filter: blur(4px);
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    user-select: none;
    -webkit-user-select: none;
  }

  .vc-face:hover {
    background: rgba(74,158,255,0.18);
    color: #4a9eff;
    border-color: rgba(74,158,255,0.7);
  }

  /* six face transforms */
  .vc-front  { transform: translateZ(22.5px); }
  .vc-back   { transform: rotateY(180deg) translateZ(22.5px); }
  .vc-right  { transform: rotateY( 90deg) translateZ(22.5px); }
  .vc-left   { transform: rotateY(-90deg) translateZ(22.5px); }
  .vc-top    { transform: rotateX( 90deg) translateZ(22.5px); }
  .vc-bottom { transform: rotateX(-90deg) translateZ(22.5px); }

  /* axis lines */
  #vc-axes-root {
    position: absolute;
    top: 22.5px;
    left: 22.5px;
    width: 0;
    height: 0;
    transform-style: preserve-3d;
  }

  .vc-axis {
    position: absolute;
    width: 70px;
    height: 2px;
    left: -35px;
    top: -1px;
    pointer-events: none;
  }

  .vc-axis::before,
  .vc-axis::after {
    content: '';
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
  }

  .vc-axis::before { left: 0; }
  .vc-axis::after  { right: 0; }

  .vc-axis.x { transform: none; }
  .vc-axis.y { transform: rotateZ(90deg); }
  .vc-axis.z { transform: rotateY(90deg); }

  .vc-axis.x::before { background: linear-gradient(to right, rgba(255,80,80,0.5), rgba(255,80,80,0)); }
  .vc-axis.x::after  { background: linear-gradient(to right, rgba(255,80,80,0), rgba(255,80,80,1)); }
  .vc-axis.y::before { background: linear-gradient(to right, rgba(80,200,80,0.5), rgba(80,200,80,0)); }
  .vc-axis.y::after  { background: linear-gradient(to right, rgba(80,200,80,0), rgba(80,200,80,1)); }
  .vc-axis.z::before { background: linear-gradient(to right, rgba(80,150,255,0.5), rgba(80,150,255,0)); }
  .vc-axis.z::after  { background: linear-gradient(to right, rgba(80,150,255,0), rgba(80,150,255,1)); }

  #vc-label {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    letter-spacing: 1px;
    color: #3a5a7a;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ── stats bar ── */
  #stats-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 28px;
    background: rgba(10,12,16,0.9);
    border-top: 1px solid #1e2a3a;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 24px;
    font-size: 10px;
    color: #4a6a8a;
    z-index: 100;
    transition: right 0.3s ease;
  }
  body.sidebar-open #stats-bar { right: 360px; }

  .stat { display: flex; gap: 6px; }
  .stat-label { color: #2a4a6a; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { color: #7a9aba; }

  #stat-fps { min-width: 24px; }

  #dl-btn {
    margin-left: auto;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid #2a3a50;
    color: #4a6a8a;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  #dl-btn:hover:not(:disabled) { border-color: #4a9eff; color: #4a9eff; }
  #dl-btn:disabled { opacity: 0.35; cursor: default; }

  /* ── sidebar ── */
  #sidebar {
    position: fixed;
    top: 48px; right: -360px; bottom: 0;
    width: 360px;
    background: rgba(10,14,20,0.96);
    border-left: 1px solid #1e2a3a;
    z-index: 90;
    transition: right 0.3s ease;
    display: flex;
    flex-direction: column;
    backdrop-filter: blur(12px);
  }
  #sidebar.open { right: 0; }
  body.sidebar-open #canvas-wrap { right: 360px; }

  #sidebar-header {
    padding: 16px;
    border-bottom: 1px solid #1e2a3a;
  }
  #sidebar-header h2 {
    font-size: 12px;
    letter-spacing: 2px;
    color: #4a9eff;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  #db-stats {
    display: flex;
    gap: 16px;
    font-size: 10px;
    color: #4a6a8a;
  }
  #db-stats .ds-item { display: flex; flex-direction: column; gap: 2px; }
  #db-stats .ds-val  { color: #7a9aba; font-size: 14px; }
  #db-stats .ds-lbl  { text-transform: uppercase; letter-spacing: 1px; }

  #search-wrap {
    padding: 12px 16px;
    border-bottom: 1px solid #1e2a3a;
  }
  #search-input {
    width: 100%;
    background: #0a0e14;
    border: 1px solid #1e2a3a;
    border-radius: 4px;
    padding: 8px 10px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #c0cfe0;
    outline: none;
    transition: border-color 0.2s;
  }
  #search-input::placeholder { color: #3a4a5a; }
  #search-input:focus { border-color: #4a7aaa; }

  #flight-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .flight-item {
    padding: 12px 16px;
    border-bottom: 1px solid #14181e;
    cursor: default;
    transition: background 0.15s;
  }
  .flight-item:hover { background: rgba(74,158,255,0.04); }
  .flight-item.current { background: rgba(74,158,255,0.08); border-left: 2px solid #4a9eff; }

  .fi-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .fi-id { font-size: 12px; color: #c0cfe0; letter-spacing: 1px; }
  .fi-status { font-size: 9px; letter-spacing: 1px; padding: 2px 6px; border-radius: 3px; }
  .fi-status.ok   { background: rgba(80,200,120,0.15); color: #4adf7a; }
  .fi-status.warn { background: rgba(220,180,60,0.15); color: #dcb43c; }
  .fi-status.fail { background: rgba(220,80,80,0.15);  color: #dc5050; }

  .fi-meta { font-size: 10px; color: #4a6a8a; margin-bottom: 6px; }

  .fi-chips { display: flex; gap: 6px; margin-bottom: 8px; }
  .chip {
    font-size: 9px;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 3px;
    background: #1a2030;
    color: #5a7a9a;
  }
  .chip.ply { background: rgba(74,158,255,0.12); color: #4a9eff; }
  .chip.bag { background: rgba(180,120,220,0.12); color: #b478dc; }
  .chip.pcd { background: rgba(80,200,180,0.12); color: #50c8b4; }

  .fi-load-btn {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 5px 10px;
    background: transparent;
    border: 1px solid #2a3a50;
    color: #4a6a8a;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .fi-load-btn:hover { border-color: #4a9eff; color: #4a9eff; }

  #db-note {
    padding: 16px;
    font-size: 11px;
    color: #3a5a7a;
    line-height: 1.5;
  }
</style>
</head>

<body>

<!-- ═══════════════════════════════════════════════════════════════════════════
  HEADER BAR
═══════════════════════════════════════════════════════════════════════════ -->
<div id="header">
  <div class="logo">DronePi</div>
  <div class="divider"></div>
  <div id="flight-info">
    <span id="info-flight">—</span>
    <span id="info-points"></span>
    <span id="info-time"></span>
  </div>

  <!-- View mode toggle -->
  <button id="view-cloud-btn" class="header-btn active" onclick="switchViewMode('cloud')" title="Point cloud view">Cloud</button>
  <button id="view-mesh-btn"  class="header-btn" onclick="switchViewMode('mesh')" title="Poisson mesh view" disabled style="opacity:0.35">Mesh</button>

  <div class="divider"></div>

  <button id="flights-btn" class="header-btn" onclick="toggleSidebar()">Flights</button>
  <button id="dl-header-btn" class="header-btn" onclick="downloadCurrentPLY()" disabled>↓ PLY</button>

  <div id="status-pill" class="waiting">WAITING</div>

<div id="progress-wrap"><div id="progress-bar"></div></div>

<div id="view-cube-wrap">
  <div id="view-cube">
    <div class="vc-face vc-front"  onclick="snapView('front')">Front</div>
    <div class="vc-face vc-back"   onclick="snapView('back')">Back</div>
    <div class="vc-face vc-right"  onclick="snapView('right')">Right</div>
    <div class="vc-face vc-left"   onclick="snapView('left')">Left</div>
    <div class="vc-face vc-top"    onclick="snapView('top')">Top</div>

    <div id="vc-axes-root">
      <div class="vc-axis x"></div>
      <div class="vc-axis y"></div>
      <div class="vc-axis z"></div>

  CANVAS

<div id="canvas-wrap">

</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
  LOADING OVERLAY
═══════════════════════════════════════════════════════════════════════════ -->
<div id="overlay">
  <div class="pulse-ring"><span class="drone-icon">🛸</span></div>
  <div id="overlay-title">Awaiting Mesh</div>
  <div id="overlay-sub">Polling /mnt/ssd/maps/latest.json</div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════

  <div class="stat"><span class="stat-label">Verts</span><span class="stat-value" id="stat-verts">—</span></div>
  <div class="stat"><span class="stat-label">Faces</span><span class="stat-value" id="stat-faces">—</span></div>

<div id="sidebar">
  <div id="sidebar-header">
    <h2>Flight Database</h2>
    <div id="db-stats">
      <div class="ds-item"><span class="ds-val" id="db-total">—</span><span class="ds-lbl">Total</span></div>
      <div class="ds-item"><span class="ds-val" id="db-complete">—</span><span class="ds-lbl">Complete</span></div>
      <div class="ds-item"><span class="ds-val" id="db-size">—</span><span class="ds-lbl">Size</span></div>

  <div id="search-wrap">

<!-- ═══════════════════════════════════════════════════════════════════════════
  THREE.JS + VIEWER LOGIC
═══════════════════════════════════════════════════════════════════════════ -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
window.THREE = THREE;

const POLL_INTERVAL_MS = 2000;
const params   = new URLSearchParams(window.location.search);
const BASE_URL = params.get('host')
  ? `http://${params.get('host')}`
  : `http://${window.location.host}`;

// ── Three.js setup ────────────────────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x0a0c10);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, 1, 0.01, 1000);
camera.position.set(0, -8, 5);
camera.lookAt(0, 0, 0);

const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(5, 10, 8);
scene.add(sun);

// Grid removed — scanned data has no semantic floor orientation

// ── circular point sprite ─────────────────────────────────────────────────────
const _ptCanvas  = document.createElement('canvas');
_ptCanvas.width  = 64;
_ptCanvas.height = 64;
const _ptCtx     = _ptCanvas.getContext('2d');
const _ptGrad    = _ptCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
_ptGrad.addColorStop(0.0,  'rgba(255,255,255,1.0)');
_ptGrad.addColorStop(0.5,  'rgba(255,255,255,0.9)');
_ptGrad.addColorStop(1.0,  'rgba(255,255,255,0.0)');
_ptCtx.fillStyle = _ptGrad;
_ptCtx.fillRect(0, 0, 64, 64);
const pointSprite = new THREE.CanvasTexture(_ptCanvas);

// ══════════════════════════════════════════════════════════════════════════════
// TRACKBALL ORBIT CONTROLS (VIEW-RELATIVE ROTATION)
// ══════════════════════════════════════════════════════════════════════════════
// Uses quaternions for rotation accumulation. Drag directions are relative to
// the current camera view, not fixed world axes. This matches the feel of
// Blender, Fusion 360, and other 3D modeling software.
//
// - Horizontal drag: rotates around the screen's vertical axis
// - Vertical drag: rotates around the screen's horizontal axis
// - Both work intuitively regardless of current orientation
// ══════════════════════════════════════════════════════════════════════════════

let isDragging  = false;
let isRightDrag = false;
let lastX = 0, lastY = 0;

// Orbit state: quaternion-based rotation + distance + pan offset
let orbitQuat   = new THREE.Quaternion();  // accumulated rotation
let orbitRadius = 12;                       // distance from target
let orbitTarget = new THREE.Vector3(0, 0, 0); // pan offset / look-at point

// Initial view: slightly above and in front
const initEuler = new THREE.Euler(-Math.PI / 6, 0, 0, 'YXZ');
orbitQuat.setFromEuler(initEuler);

function updateCamera() {
  // Camera position = target + (rotated forward vector * radius)
  // Default forward is (0, 0, 1) in camera space; we rotate it by orbitQuat
  const forward = new THREE.Vector3(0, 0, 1);
  forward.applyQuaternion(orbitQuat);
  
  camera.position.copy(orbitTarget).addScaledVector(forward, orbitRadius);
  camera.quaternion.copy(orbitQuat);
  
  syncCube();
}
updateCamera();

// ── trackball rotation from mouse delta ─────────────────────────────────────
function applyTrackballRotation(dx, dy) {
  const sensitivity = 0.005;
  
  // Get camera's right and up vectors in world space
  const right = new THREE.Vector3(1, 0, 0).applyQuaternion(orbitQuat);
  const up    = new THREE.Vector3(0, 1, 0).applyQuaternion(orbitQuat);
  
  // Create rotation quaternions:
  // - Horizontal drag (dx) rotates around the camera's UP vector
  // - Vertical drag (dy) rotates around the camera's RIGHT vector
  const rotY = new THREE.Quaternion().setFromAxisAngle(up, -dx * sensitivity);
  const rotX = new THREE.Quaternion().setFromAxisAngle(right, -dy * sensitivity);
  
  // Apply rotations: first horizontal, then vertical
  // Order: new rotation * existing rotation (premultiply)
  orbitQuat.premultiply(rotY);
  orbitQuat.premultiply(rotX);
  orbitQuat.normalize();
  
  updateCamera();
}

// ── view cube sync ────────────────────────────────────────────────────────────
// Syncs the CSS 3D view cube to match the camera's orientation.
// 
// Coordinate system differences:
// - Three.js (WebGL): Right-handed, Y-up for camera, but we use Z-up for world
// - CSS 3D: Y-down (screen coordinates), Z comes out of screen
//
// The cube shows the INVERSE of camera rotation (world-space feel) — if you
// orbit right, the cube appears to rotate left, matching CAD software behavior.
function syncCube() {
  const cube = document.getElementById('view-cube');
  if (!cube) return;
  
  // We need to convert from Three.js camera space to CSS 3D space.
  // The camera quaternion represents how the camera is rotated.
  // For the cube, we want to show the world's orientation as seen from camera.
  
  // Create a matrix that:
  // 1. Applies the inverse camera rotation (world from camera's POV)
  // 2. Converts from Three.js coords (Z-up) to CSS coords (Y-down, Z-out)
  
  const invQuat = orbitQuat.clone().invert();
  
  // Build rotation matrix from quaternion
  const rotMat = new THREE.Matrix4().makeRotationFromQuaternion(invQuat);
  
  // Coordinate transform: Three.js Z-up → CSS Y-down
  // In Three.js: X=right, Y=up (camera), Z=out
  // In CSS 3D:   X=right, Y=down, Z=out
  // So we need to flip Y, and our world Z-up maps to CSS -Y
  const coordSwap = new THREE.Matrix4().set(
    1,  0,  0,  0,   // X stays X
    0,  0,  1,  0,   // CSS Y ← Three.js Z (up becomes down-ish)  
    0, -1,  0,  0,   // CSS Z ← -Three.js Y
    0,  0,  0,  1
  );
  
  // Combined transformation
  const finalMat = new THREE.Matrix4().multiplyMatrices(coordSwap, rotMat);
  const e = finalMat.elements;
  
  // CSS matrix3d is column-major, same as Three.js Matrix4.elements
  const cssMatrix = `matrix3d(${e[0]},${e[1]},${e[2]},${e[3]},${e[4]},${e[5]},${e[6]},${e[7]},${e[8]},${e[9]},${e[10]},${e[11]},${e[12]},${e[13]},${e[14]},${e[15]})`;
  
  cube.style.transform = cssMatrix;
}

// ── snap to preset view ───────────────────────────────────────────────────────
// Animates quaternion to preset orientations over ~300ms
const VIEW_PRESETS = {
  front:  new THREE.Quaternion().setFromEuler(new THREE.Euler(0, 0, 0, 'YXZ')),
  back:   new THREE.Quaternion().setFromEuler(new THREE.Euler(0, Math.PI, 0, 'YXZ')),
  right:  new THREE.Quaternion().setFromEuler(new THREE.Euler(0, -Math.PI/2, 0, 'YXZ')),
  left:   new THREE.Quaternion().setFromEuler(new THREE.Euler(0, Math.PI/2, 0, 'YXZ')),
  top:    new THREE.Quaternion().setFromEuler(new THREE.Euler(-Math.PI/2, 0, 0, 'YXZ')),
  bottom: new THREE.Quaternion().setFromEuler(new THREE.Euler(Math.PI/2, 0, 0, 'YXZ')),
};

function snapView(preset) {
  const target = VIEW_PRESETS[preset];
  if (!target) return;
  
  const startQuat = orbitQuat.clone();
  const startTime = performance.now();
  const duration  = 300; // ms
  
  function animStep(now) {
    const t = Math.min((now - startTime) / duration, 1);
    // Smooth ease-in-out
    const ease = t * t * (3 - 2 * t);
    
    // Spherical linear interpolation between quaternions
    orbitQuat.slerpQuaternions(startQuat, target, ease);
    updateCamera();
    
    if (t < 1) requestAnimationFrame(animStep);
  }
  requestAnimationFrame(animStep);
}
window.snapView = snapView;

// ── view cube drag ───────────────────────────────────────────────────────────
let cubeDragging    = false;
let cubeDragMoved   = false;
let cubeDragStartX  = 0;
let cubeDragStartY  = 0;
const CUBE_DRAG_THRESHOLD = 3;

const cubeWrap = document.getElementById('view-cube-wrap');

cubeWrap.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  cubeDragging   = true;
  cubeDragMoved  = false;
  cubeDragStartX = e.clientX;
  cubeDragStartY = e.clientY;
  lastX = e.clientX;
  lastY = e.clientY;
  e.stopPropagation();
});

window.addEventListener('mousemove', e => {
  if (!cubeDragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX;
  lastY = e.clientY;
  
  const totalMoved = Math.abs(e.clientX - cubeDragStartX)
                   + Math.abs(e.clientY - cubeDragStartY);
  if (!cubeDragMoved && totalMoved < CUBE_DRAG_THRESHOLD) return;
  cubeDragMoved = true;
  
  applyTrackballRotation(dx, dy);
});

window.addEventListener('mouseup', () => {
  cubeDragging = false;
});

cubeWrap.addEventListener('click', e => {
  if (cubeDragMoved) {
    e.stopPropagation();
    cubeDragMoved = false;
  }
}, true);

// ── canvas mouse controls ────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  isDragging  = true;
  isRightDrag = e.button === 2;
  lastX = e.clientX;
  lastY = e.clientY;
});
window.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX;
  lastY = e.clientY;
  
  if (isRightDrag) {
    // Pan: move target in screen-relative directions
    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(orbitQuat);
    const up    = new THREE.Vector3(0, 1, 0).applyQuaternion(orbitQuat);
    const panScale = orbitRadius * 0.002;
    orbitTarget.addScaledVector(right, -dx * panScale);
    orbitTarget.addScaledVector(up, dy * panScale);
    updateCamera();
  } else {
    // Trackball rotation
    applyTrackballRotation(dx, dy);
  }
});

canvas.addEventListener('wheel', e => {
  orbitRadius = Math.max(0.5, Math.min(200, orbitRadius + e.deltaY * 0.02));
  updateCamera();
}, { passive: true });

// ── touch controls ───────────────────────────────────────────────────────────
let touchStartDist = 0;
let touchStartRadius = 0;

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    isRightDrag = false;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    // Pinch to zoom
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touchStartDist = Math.sqrt(dx*dx + dy*dy);
    touchStartRadius = orbitRadius;
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - lastX;
    const dy = e.touches[0].clientY - lastY;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    applyTrackballRotation(dx, dy);
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const scale = touchStartDist / dist;
    orbitRadius = Math.max(0.5, Math.min(200, touchStartRadius * scale));
    updateCamera();
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', () => {
  isDragging = false;
});

// ══════════════════════════════════════════════════════════════════════════════
// VIRIDIS COLOR RAMP
// ══════════════════════════════════════════════════════════════════════════════
function viridis(t) {
  t = Math.max(0.0, Math.min(1.0, t));
  const r = Math.max(0, Math.min(1,
      0.2777 + t * (0.1068 + t * (2.2994 + t * (-12.7400 + t * (25.4992 + t * (-18.5145 + t * 4.1130)))))));
  const g = Math.max(0, Math.min(1,
      0.0047 + t * (1.2280 + t * (-0.1520 + t * (-0.2434 + t * (-0.5091 + t * (1.5332 + t * -0.8001)))))));
  const b = Math.max(0, Math.min(1,
      0.3286 + t * (1.5756 + t * (-6.3437 + t * (14.5045 + t * (-17.6439 + t * (10.5688 + t * -2.3720)))))));
  return [r, g, b];
}

function isAllWhite(colors, nVerts) {
  const sampleSize = Math.min(100, nVerts);
  const step       = Math.max(1, Math.floor(nVerts / sampleSize));
  let sum = 0, count = 0;
  for (let i = 0; i < nVerts; i += step) {
    sum += colors[i*3] + colors[i*3+1] + colors[i*3+2];
    count += 3;
  }
  return (sum / count) > 0.98;
}

function applyViridisHeightRamp(positions, nVerts) {
  let zMin =  Infinity, zMax = -Infinity;
  for (let i = 0; i < nVerts; i++) {
    const z = positions[i * 3 + 2];
    if (z < zMin) zMin = z;
    if (z > zMax) zMax = z;
  }
  const zRange = zMax - zMin || 1.0;

  const colors = new Float32Array(nVerts * 3);
  for (let i = 0; i < nVerts; i++) {
    const t = (positions[i * 3 + 2] - zMin) / zRange;
    const [r, g, b] = viridis(t);
    colors[i * 3]     = r;
    colors[i * 3 + 1] = g;
    colors[i * 3 + 2] = b;
  }
  return colors;
}

// ══════════════════════════════════════════════════════════════════════════════
// PLY PARSER
// ══════════════════════════════════════════════════════════════════════════════
function plyTypeSize(type) {
  const sizes = { char:1, uchar:1, short:2, ushort:2, int:4, uint:4,
                  float:4, float32:4, double:8, float64:8 };
  return sizes[type] || 4;
}

function plyTypeReader(view, type, offset, le) {
  switch(type) {
    case 'float': case 'float32': return view.getFloat32(offset, le);
    case 'double': case 'float64': return view.getFloat64(offset, le);
    case 'int':   case 'int32':   return view.getInt32(offset, le);
    case 'uint':  case 'uint32':  return view.getUint32(offset, le);
    case 'short': case 'int16':   return view.getInt16(offset, le);
    case 'ushort':case 'uint16':  return view.getUint16(offset, le);
    case 'char':  case 'int8':    return view.getInt8(offset);
    case 'uchar': case 'uint8':   return view.getUint8(offset);
    default:                       return view.getFloat32(offset, le);
  }
}

function parsePLY(buffer) {
  const headerBytes = new Uint8Array(buffer, 0, Math.min(4096, buffer.byteLength));
  const headerText  = new TextDecoder().decode(headerBytes);
  const lines       = headerText.split('\n');

  let format = 'ascii';
  let nVerts = 0, nFaces = 0;
  const vertexProps = [];
  let inVertex = false, inFace = false;
  let headerEndIdx = 0;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    headerEndIdx += lines[i].length + 1;
    if (line.startsWith('format')) {
      if (line.includes('binary_little')) format = 'binary_little';
      else if (line.includes('binary_big')) format = 'binary_big';
    } else if (line.startsWith('element vertex')) {
      nVerts = parseInt(line.split(/\s+/)[2], 10);
      inVertex = true; inFace = false;
    } else if (line.startsWith('element face')) {
      nFaces = parseInt(line.split(/\s+/)[2], 10);
      inVertex = false; inFace = true;
    } else if (line.startsWith('property') && inVertex) {
      const parts = line.split(/\s+/);
      vertexProps.push({ type: parts[1], name: parts[2] });
    } else if (line === 'end_header') {
      break;
    }
  }

  const positions = new Float32Array(nVerts * 3);
  const colors    = new Float32Array(nVerts * 3);
  let indices = null;
  if (nFaces > 0) indices = new Uint32Array(nFaces * 3);

  const propIndex = {};
  vertexProps.forEach((p, i) => propIndex[p.name] = i);

  const hasColor = ('red' in propIndex) && ('green' in propIndex) && ('blue' in propIndex);

  if (format === 'ascii') {
    const bodyText = new TextDecoder().decode(new Uint8Array(buffer, headerEndIdx));
    const dataLines = bodyText.trim().split('\n');
    for (let i = 0; i < nVerts; i++) {
      const vals = dataLines[i].trim().split(/\s+/);
      positions[i*3]   = parseFloat(vals[propIndex['x']]);
      positions[i*3+1] = parseFloat(vals[propIndex['y']]);
      positions[i*3+2] = parseFloat(vals[propIndex['z']]);
      if (hasColor) {
        colors[i*3]   = parseFloat(vals[propIndex['red']])   / 255;
        colors[i*3+1] = parseFloat(vals[propIndex['green']]) / 255;
        colors[i*3+2] = parseFloat(vals[propIndex['blue']])  / 255;
      }
    }
    for (let i = 0; i < nFaces; i++) {
      const vals = dataLines[nVerts + i].trim().split(/\s+/);
      indices[i*3]   = parseInt(vals[1], 10);
      indices[i*3+1] = parseInt(vals[2], 10);
      indices[i*3+2] = parseInt(vals[3], 10);
    }
  } else {
    const le   = (format === 'binary_little');
    const view = new DataView(buffer, headerEndIdx);
    let vertexStride = 0;
    vertexProps.forEach(p => vertexStride += plyTypeSize(p.type));

    let propOffsets = [];
    let off = 0;
    for (const p of vertexProps) {
      propOffsets.push(off);
      off += plyTypeSize(p.type);
    }

    for (let i = 0; i < nVerts; i++) {
      const base = i * vertexStride;
      positions[i*3]   = plyTypeReader(view, vertexProps[propIndex['x']].type, base + propOffsets[propIndex['x']], le);
      positions[i*3+1] = plyTypeReader(view, vertexProps[propIndex['y']].type, base + propOffsets[propIndex['y']], le);
      positions[i*3+2] = plyTypeReader(view, vertexProps[propIndex['z']].type, base + propOffsets[propIndex['z']], le);
      if (hasColor) {
        colors[i*3]   = plyTypeReader(view, vertexProps[propIndex['red']].type,   base + propOffsets[propIndex['red']],   le) / 255;
        colors[i*3+1] = plyTypeReader(view, vertexProps[propIndex['green']].type, base + propOffsets[propIndex['green']], le) / 255;
        colors[i*3+2] = plyTypeReader(view, vertexProps[propIndex['blue']].type,  base + propOffsets[propIndex['blue']],  le) / 255;
      }
    }

    if (nFaces > 0) {
      let faceOffset = nVerts * vertexStride;
      for (let i = 0; i < nFaces; i++) {
        const nv = view.getUint8(faceOffset); faceOffset += 1;
        indices[i*3]   = view.getUint32(faceOffset, le); faceOffset += 4;
        indices[i*3+1] = view.getUint32(faceOffset, le); faceOffset += 4;
        indices[i*3+2] = view.getUint32(faceOffset, le); faceOffset += 4;
      }
    }
  }

  return { positions, colors, indices, nVerts, nFaces, hasColor };
}

// ══════════════════════════════════════════════════════════════════════════════
// MESH LOADING
// ══════════════════════════════════════════════════════════════════════════════
let currentMesh = null;
let currentBuffer = null;

async function loadMesh(filename) {
  if (!filename) return;
  setStatus('loading', 'LOADING');
  setProgress(10);
  try {
    const resp = await fetch(`${BASE_URL}/${filename}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    setProgress(40);
    currentBuffer = await resp.arrayBuffer();
    setProgress(70);
    displayMesh(currentBuffer);
  } catch (e) {
    setStatus('error', 'ERROR');
    console.error('Failed to load mesh:', e);
  }
}
window.loadMesh = loadMesh;

function displayMesh(buffer) {
  if (currentMesh) { scene.remove(currentMesh); currentMesh.geometry.dispose(); }

  const { positions, colors, indices, nVerts, nFaces, hasColor } = parsePLY(buffer);

  // Apply viridis height ramp if no color or all-white
  let finalColors = colors;
  if (!hasColor || isAllWhite(colors, nVerts)) {
    finalColors = applyViridisHeightRamp(positions, nVerts);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(finalColors, 3));

  if (indices && nFaces > 0) {
    geo.setIndex(new THREE.BufferAttribute(indices, 1));
    geo.computeVertexNormals();
    const mat = new THREE.MeshStandardMaterial({
      vertexColors: true,
      flatShading: false,
      side: THREE.DoubleSide,
    });
    currentMesh = new THREE.Mesh(geo, mat);
  } else {
    const mat = new THREE.PointsMaterial({
      size: 0.03,
      vertexColors: true,
      sizeAttenuation: true,
      map: pointSprite,
      transparent: true,
      alphaTest: 0.01,
      depthWrite: false,
    });
    currentMesh = new THREE.Points(geo, mat);
  }
  scene.add(currentMesh);

  // Auto-frame: reset orbit to frame the new mesh
  geo.computeBoundingSphere();
  const { center, radius: r } = geo.boundingSphere;
  
  orbitTarget.copy(center);
  orbitRadius = r * 2.5;
  
  // Reset to a nice initial view angle
  orbitQuat.setFromEuler(new THREE.Euler(-Math.PI / 6, Math.PI / 8, 0, 'YXZ'));
  updateCamera();

  document.getElementById('stat-verts').textContent = nVerts.toLocaleString();
  document.getElementById('stat-faces').textContent = nFaces.toLocaleString();

  document.getElementById('dl-btn').disabled        = false;
  document.getElementById('dl-header-btn').disabled = false;

  setProgress(100);
  setTimeout(() => setProgress(0), 800);
  setStatus('ready', 'READY');
  document.getElementById('overlay').classList.add('hidden');
}

// ══════════════════════════════════════════════════════════════════════════════
// PLY DOWNLOAD
// ══════════════════════════════════════════════════════════════════════════════
function downloadCurrentPLY() {
  if (!currentBuffer) return;
  const blob = new Blob([currentBuffer], { type: 'application/octet-stream' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = (lastFilename || 'mesh') ;
  a.click();
  URL.revokeObjectURL(url);
}
window.downloadCurrentPLY = downloadCurrentPLY;

// ── view mode state ───────────────────────────────────────────────────────────
let currentCloudFile = null;
let currentMeshFile  = null;
let activeViewMode   = 'cloud';
let lastFilename     = null;

function switchViewMode(mode) {
  if (mode === 'cloud' && !currentCloudFile) return;
  if (mode === 'mesh'  && !currentMeshFile)  return;
  activeViewMode = mode;

  document.getElementById('view-cloud-btn').classList.toggle('active', mode === 'cloud');
  document.getElementById('view-mesh-btn').classList.toggle('active',  mode === 'mesh');

  const file = mode === 'cloud' ? currentCloudFile : currentMeshFile;
  loadMesh(file);
}
window.switchViewMode = switchViewMode;

// ── manifest poller ───────────────────────────────────────────────────────────
async function pollManifest() {
  try {
    const resp = await fetch(`${BASE_URL}/latest.json`, { cache: 'no-store' });
    if (!resp.ok) return;

    const data = await resp.json();
    const { cloud_ply, mesh_ply, filename, flight_name, timestamp, point_count } = data;

    document.getElementById('info-flight').textContent = flight_name || filename || '—';
    document.getElementById('info-points').textContent = point_count
      ? `${parseInt(point_count).toLocaleString()} pts` : '';
    document.getElementById('info-time').textContent   = timestamp || '';

    const cloudFile = cloud_ply || filename || null;
    const meshFile  = mesh_ply  || null;

    const sessionKey = cloudFile;

    if (sessionKey && sessionKey !== lastFilename) {
      lastFilename     = sessionKey;
      currentCloudFile = cloudFile;
      currentMeshFile  = meshFile;

      document.getElementById('view-cloud-btn').disabled = !cloudFile;
      document.getElementById('view-mesh-btn').disabled  = !meshFile;

      document.getElementById('view-mesh-btn').style.opacity = meshFile ? '1' : '0.35';
      document.getElementById('view-mesh-btn').title = meshFile
        ? 'Switch to Poisson mesh view'
        : 'Mesh not available — run postprocess_mesh.py without --no-mesh';

      activeViewMode = 'cloud';
      document.getElementById('view-cloud-btn').classList.add('active');
      document.getElementById('view-mesh-btn').classList.remove('active');

      await loadMesh(cloudFile);
    }
  } catch (e) {
    // stay silent on network errors
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// FLIGHT DATABASE SIDEBAR
// ══════════════════════════════════════════════════════════════════════════════
let allFlights   = [];
let sidebarOpen  = false;

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
  document.body.classList.toggle('sidebar-open', sidebarOpen);
  document.getElementById('flights-btn').classList.toggle('active', sidebarOpen);
  setTimeout(onResize, 320);
  if (sidebarOpen && allFlights.length === 0) fetchFlightDB();
}
window.toggleSidebar = toggleSidebar;

async function fetchFlightDB() {
  try {
    const resp = await fetch(`${BASE_URL}/api/flights`, { cache: 'no-store' });
    if (resp.status === 404) {
      document.getElementById('db-note').textContent =
        '/api/flights not yet deployed on Pi — add the endpoint to serve.py to enable the database.';
      return;
    }
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const data = await resp.json();
    allFlights = data.flights || [];

    document.getElementById('db-total').textContent    = data.total_flights   ?? allFlights.length;
    document.getElementById('db-complete').textContent = data.complete_count  ?? '—';
    document.getElementById('db-size').textContent     = data.total_size_gb
      ? `${data.total_size_gb} GB` : '—';

    renderFlights(allFlights);
  } catch (e) {
    document.getElementById('db-note').textContent =
      'Could not reach /api/flights. Pi may still be booting or endpoint not yet deployed.';
    console.warn('Flight DB fetch failed:', e);
  }
}

function renderFlights(flights) {
  const list = document.getElementById('flight-list');
  if (flights.length === 0) {
    list.innerHTML = '<div id="db-note">No flights found.</div>';
    return;
  }

  list.innerHTML = flights.map(f => {
    const isCurrent = f.ply_file && f.ply_file === lastFilename;
    const statusCls = f.status === 'complete' ? 'ok' : f.status === 'partial' ? 'warn' : 'fail';
    const chips = (f.files || []).map(ext =>
      `<span class="chip ${ext}">${ext.toUpperCase()}</span>`).join('');
    const pts = f.point_count ? parseInt(f.point_count).toLocaleString() : '—';
    const size = f.size_mb ? `${f.size_mb} MB` : '';

    return `
      <div class="flight-item${isCurrent ? ' current' : ''}" id="fi-${f.id}">
        <div class="fi-top">
          <span class="fi-id">${f.id}</span>
          <span class="fi-status ${statusCls}">${(f.status || '').toUpperCase()}</span>
        </div>
        <div class="fi-meta"><span>${f.timestamp || ''}</span> &nbsp;·&nbsp; ${f.duration || ''} &nbsp;·&nbsp; ${pts} pts</div>
        <div class="fi-chips">${chips}</div>
        ${f.ply_file ? `<button class="fi-load-btn" onclick="loadFromDB('${f.ply_file}','${f.id}')">Load mesh →</button>` : ''}
      </div>`;
  }).join('');
}

function filterFlights(query) {
  const q = query.toLowerCase().trim();
  if (!q) { renderFlights(allFlights); return; }
  renderFlights(allFlights.filter(f =>
    (f.id         || '').toLowerCase().includes(q) ||
    (f.timestamp  || '').toLowerCase().includes(q) ||
    (f.status     || '').toLowerCase().includes(q)
  ));
}
window.filterFlights = filterFlights;

async function loadFromDB(plyFile, flightId) {
  lastFilename = plyFile;
  const f = allFlights.find(x => x.id === flightId);
  if (f) {
    document.getElementById('info-flight').textContent = f.id;
    document.getElementById('info-points').textContent = f.point_count
      ? `${parseInt(f.point_count).toLocaleString()} pts` : '';
    document.getElementById('info-time').textContent   = f.timestamp || '';
  }
  await loadMesh(plyFile);
  document.querySelectorAll('.flight-item').forEach(el => el.classList.remove('current'));
  const el = document.getElementById(`fi-${flightId}`);
  if (el) el.classList.add('current');
}
window.loadFromDB = loadFromDB;

// ── boot ──────────────────────────────────────────────────────────────────────
pollManifest();
setInterval(pollManifest, POLL_INTERVAL_MS);
</script>
